name: Docker build

on:
  push:
    branches: [ "main" , "production" ]
  pull_request:
    branches: [ "main" , "production" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Copy sample content
      run: |
        cp config.toml.example config.toml
        cp -r samples/* ./
    - name: Build the Docker image
      run: docker build --tag nt-docs -f Containerfile .
